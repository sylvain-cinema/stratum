<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" fill="none">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
      .title { font-size: 13px; font-weight: 600; fill: #e5e7eb; letter-spacing: 0.05em; }
      .label { font-size: 11px; font-weight: 500; fill: #d1d5db; }
      .sublabel { font-size: 9.5px; fill: #9ca3af; }
      .spec { font-size: 9px; fill: #6b7280; font-family: 'SF Mono', 'Fira Code', monospace; }
      .arrow { stroke: #4b5563; stroke-width: 1.5; fill: none; marker-end: url(#ah); }
      .dash { stroke: #7c3aed; stroke-width: 1.2; fill: none; stroke-dasharray: 6 3; marker-end: url(#ah-p); }
    </style>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4b5563"/>
    </marker>
    <marker id="ah-p" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1100" height="480" rx="12" fill="#0d1117"/>
  <rect width="1100" height="480" rx="12" fill="none" stroke="#21262d"/>

  <text x="550" y="36" text-anchor="middle" class="title" fill="#94a3b8" style="font-size:15px; letter-spacing:0.15em;">STRATUM VOLUMETRIC PIPELINE</text>
  <text x="550" y="52" text-anchor="middle" class="spec">Depth Input  →  Layer Decomposition  →  Vulkan Rendering  →  Volumetric Output</text>

  <!-- Depth Input -->
  <rect x="30" y="80" width="190" height="130" rx="8" fill="#161b22" stroke="#475569"/>
  <text x="125" y="102" text-anchor="middle" class="title">DEPTH INPUT</text>
  <line x1="50" y1="112" x2="200" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="125" y="132" text-anchor="middle" class="label">Depth Estimator</text>
  <text x="125" y="150" text-anchor="middle" class="sublabel">Monocular neural inference</text>
  <text x="125" y="168" text-anchor="middle" class="sublabel">Stereo disparity</text>
  <text x="125" y="186" text-anchor="middle" class="sublabel">Embedded metadata</text>
  <text x="125" y="202" text-anchor="middle" class="spec">core/depth_map</text>

  <path d="M 220 145 L 270 145" class="arrow"/>

  <!-- Layer Decomposition -->
  <rect x="270" y="80" width="220" height="130" rx="8" fill="#161b22" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="380" y="102" text-anchor="middle" class="title" fill="#94a3b8">LAYER DECOMPOSITION</text>
  <line x1="290" y1="112" x2="470" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="380" y="132" text-anchor="middle" class="label">Multi-Plane Compositor</text>
  <text x="380" y="150" text-anchor="middle" class="sublabel">16 depth planes</text>
  <text x="380" y="168" text-anchor="middle" class="sublabel">Depth peeling algorithm</text>
  <text x="380" y="186" text-anchor="middle" class="sublabel">Back-to-front alpha blending</text>
  <text x="380" y="202" text-anchor="middle" class="spec">core/compositor</text>

  <path d="M 490 145 L 540 145" class="arrow"/>

  <!-- Vulkan Renderer -->
  <rect x="540" y="80" width="220" height="130" rx="8" fill="#161b22" stroke="#64748b" stroke-width="1.5"/>
  <text x="650" y="102" text-anchor="middle" class="title" fill="#64748b">VULKAN RENDERER</text>
  <line x1="560" y1="112" x2="740" y2="112" stroke="#30363d" stroke-width="0.5"/>
  <text x="650" y="132" text-anchor="middle" class="label">Layer Manager</text>
  <text x="650" y="150" text-anchor="middle" class="sublabel">16 x 8K transparent planes</text>
  <text x="650" y="168" text-anchor="middle" class="label">Transparency Blend</text>
  <text x="650" y="186" text-anchor="middle" class="sublabel">85% optical clarity</text>
  <text x="650" y="202" text-anchor="middle" class="spec">renderer/vulkan</text>

  <path d="M 760 145 L 810 145" class="arrow"/>

  <!-- Volumetric Output -->
  <rect x="810" y="95" width="170" height="100" rx="8" fill="#161b22" stroke="#94a3b8" stroke-width="2"/>
  <text x="895" y="118" text-anchor="middle" class="title" fill="#94a3b8">VOLUMETRIC FIELD</text>
  <line x1="830" y1="128" x2="960" y2="128" stroke="#30363d" stroke-width="0.5"/>
  <text x="895" y="148" text-anchor="middle" class="label">3D Volume</text>
  <text x="895" y="166" text-anchor="middle" class="sublabel">0.5 m – 15 m depth</text>
  <text x="895" y="184" text-anchor="middle" class="sublabel">No glasses / Zero fatigue</text>

  <!-- Integration row -->
  <rect x="270" y="280" width="200" height="80" rx="8" fill="#161b22" stroke="#f59e0b"/>
  <text x="370" y="302" text-anchor="middle" class="title" fill="#f59e0b">SPECTRA SYNC</text>
  <line x1="290" y1="312" x2="450" y2="312" stroke="#30363d" stroke-width="0.5"/>
  <text x="370" y="332" text-anchor="middle" class="sublabel">Frame-level lock at 240 Hz</text>
  <text x="370" y="348" text-anchor="middle" class="spec">integration/spectra_sync</text>

  <rect x="540" y="280" width="200" height="80" rx="8" fill="#161b22" stroke="#a855f7"/>
  <text x="640" y="302" text-anchor="middle" class="title" fill="#a855f7">SENTIO BRIDGE</text>
  <line x1="560" y1="312" x2="720" y2="312" stroke="#30363d" stroke-width="0.5"/>
  <text x="640" y="332" text-anchor="middle" class="sublabel">Depth commands / Intensity</text>
  <text x="640" y="348" text-anchor="middle" class="spec">integration/sentio_commands</text>

  <path d="M 370 280 L 650 210" class="arrow"/>
  <path d="M 640 280 L 380 210" class="dash"/>

  <!-- Legend -->
  <rect x="30" y="410" width="1040" height="50" rx="6" fill="#0d1117" stroke="#21262d"/>
  <line x1="50" y1="438" x2="80" y2="438" class="arrow"/>
  <text x="90" y="442" class="spec">Data flow</text>
  <line x1="180" y1="438" x2="210" y2="438" class="dash"/>
  <text x="220" y="442" class="spec">SENTIO narrative control</text>
  <rect x="400" y="430" width="12" height="12" rx="2" fill="none" stroke="#94a3b8"/>
  <text x="420" y="442" class="spec">core</text>
  <rect x="470" y="430" width="12" height="12" rx="2" fill="none" stroke="#64748b"/>
  <text x="490" y="442" class="spec">renderer</text>
  <rect x="560" y="430" width="12" height="12" rx="2" fill="none" stroke="#f59e0b"/>
  <text x="580" y="442" class="spec">spectra (external)</text>
  <rect x="700" y="430" width="12" height="12" rx="2" fill="none" stroke="#a855f7"/>
  <text x="720" y="442" class="spec">sentio (external)</text>
  <text x="880" y="442" class="spec">16 planes  /  8K per layer  /  &lt; 5 ms compositing</text>
</svg>
